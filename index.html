<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Million Times</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #d8d3ca; }
      canvas { display: block; width: 100vw; height: 100vh; }

      #pattern-bar {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        gap: 6px;
        padding: 6px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 2px 16px rgba(60, 50, 40, 0.12), 0 1px 3px rgba(60, 50, 40, 0.08);
        opacity: 1;
        transition: opacity 0.4s ease;
        font-family: 'Inter', system-ui, sans-serif;
        flex-wrap: wrap;
        justify-content: center;
        max-width: calc(100vw - 32px);
      }

      #pattern-bar.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #pattern-bar button {
        padding: 6px 14px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: #4a4540;
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        white-space: nowrap;
        letter-spacing: 0.01em;
      }

      #pattern-bar button:hover {
        background: rgba(255, 255, 255, 0.5);
        color: #1c1b1a;
      }

      #pattern-bar button.active {
        background: #1c1b1a;
        color: #f7f5f0;
        box-shadow: 0 1px 4px rgba(28, 27, 26, 0.25);
      }

      #pattern-bar button.active:hover {
        background: #2d2c2a;
        color: #f7f5f0;
      }

      #attribution {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 12px;
        color: #8c8880;
        text-align: center;
        letter-spacing: 0.02em;
        pointer-events: none;
        opacity: 0.8;
      }
      
      #attribution a {
        color: #4a4540;
        text-decoration: none;
        font-weight: 500;
        pointer-events: auto;
        transition: color 0.2s ease;
      }

      #attribution a:hover {
        color: #1c1b1a;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div id="pattern-bar"></div>
    <div id="attribution">Inspired by <a href="https://clockforward.com/humans-since-1982/a-million-times/" target="_blank" rel="noopener noreferrer">A million Times</a></div>
    <canvas id="stage"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
